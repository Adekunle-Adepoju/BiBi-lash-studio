<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Booking Received — BiBi Lash Studio</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400&family=Inter:wght@300;400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--rose:#c8877a;--rose-dk:#a8655a;--border:#ead8d0;--muted:#9a8078;--bg:#fdf8f6}
body{font-family:'Inter',sans-serif;font-weight:300;background:var(--bg);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.card{background:#fff;border:1px solid var(--border);border-radius:20px;padding:64px 56px;max-width:520px;width:100%;text-align:center}
.icon{font-size:3rem;margin-bottom:20px}
h1{font-family:'Playfair Display',serif;font-size:2rem;font-weight:400;margin-bottom:12px}
h1 em{font-style:italic;color:var(--rose)}
p{color:var(--muted);font-size:.9rem;line-height:1.75;margin-bottom:12px}
.divider{height:1px;background:var(--border);margin:28px 0}
.btn{display:inline-block;margin-top:28px;padding:14px 36px;background:var(--rose);color:#fff;border-radius:100px;font-size:.82rem;text-decoration:none}
.btn:hover{background:var(--rose-dk)}
</style>
</head>
<body>
<div class="card">
  <div class="icon">🌸</div>
  <h1>You are all <em>set!</em></h1>
  <p>We have received your booking request and will confirm your appointment within 24 hours. A confirmation email is on its way to you.</p>
  <div class="divider"></div>
  <p>Questions? Call <strong>+1 (212) 555-0199</strong> or email <strong>hello@roseelash.com</strong></p>
  <a href="/" class="btn">Back to home</a>
</div>
</body>
</html>
